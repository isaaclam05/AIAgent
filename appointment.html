    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="background-blur blur1"></div>
<div class="background-blur blur2"></div>

    <header class="navbar">
        
        <div class="container">
            
            <a href="index.html" class="logo">
                
                <div class="logo-circle">
                    
                    <img src="images/logo.jpg" alt="Remi+ Logo">
                
                </div>
                
                <span>Remi+</span>
            
            </a>
            
            <nav class="nav-links">
                
                <a href="index.html">Home</a>
                
                <a href="index.html#chat">AI Chat</a>
                
                <a href="medication.html">Medications</a>
                
                <a href="appointment.html">Appointments</a>
                
                <a href="contact.html">Contact</a>
            
            </nav>
            
            <div class="nav-right">
                
                <button id="themeToggle" class="theme-toggle">
                    🌙
                </button>
                
                <button class="login-btn">
                    Login
                </button>
            
            </div>
        
        </div>
    
    </header>

<section class="chat-section">
    <div class="container">

        <div class="section-title">
            <span>APPOINTMENTS</span>
            <h2>Smart Scheduling</h2>
            <p>Let Remi+ manage your medical and personal appointments.</p>
        </div>

        <div class="chat-container">

            <div class="chat-header">
                <div class="chat-user">
                    <div class="chat-avatar">📅</div>
                    <div>
                        <h3>Appointment System</h3>
                        <span>● Active</span>
                    </div>
                </div>
            </div>

            <div class="chat-messages">

                <div class="bot-message markdown-body">

                    <h3>📅 Book Appointment</h3>

                    <input type="text" placeholder="Doctor / Service">
                    <input type="date">
                    <input type="time">

                    <button class="primary-btn" style="margin-top:15px;">
                        Book Appointment
                    </button>

                </div>

                <div class="bot-message markdown-body">
                    <h3>🗓 Upcoming Appointments</h3>
                    <p>No appointments scheduled.</p>
                </div>

            </div>

        </div>

    </div>
</section>
