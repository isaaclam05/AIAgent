<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Remi+</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="background-blur blur1"></div>
<div class="background-blur blur2"></div>

<header class="navbar">
    <div class="container">

        <a href="index.html" class="logo">
            <div class="logo-circle">🤖</div>
            <span>Remi+</span>
        </a>

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#chat">AI Chat</a>
            <a href="medication.html">Medications</a>
            <a href="appointments.html">Appointments</a>
            <a href="contact.html">Contact</a>
        </nav>

        <div class="nav-right">
            <button class="theme-toggle">🌙</button>
            <button class="login-btn">Login</button>
        </div>

    </div>
</header>

<section class="chat-section">
    <div class="container">

        <div class="section-title">
            <span>CONTACT</span>
            <h2>Get in Touch</h2>
            <p>Send feedback, report issues, or suggest improvements.</p>
        </div>

        <div class="chat-container">

            <div class="chat-header">
                <div class="chat-user">
                    <div class="chat-avatar">📩</div>
                    <div>
                        <h3>Support Center</h3>
                        <span>● Online</span>
                    </div>
                </div>
            </div>

            <div class="chat-messages">

                <div class="bot-message markdown-body">

                    <h3>📩 Contact Form</h3>

                    <input type="text" placeholder="Your Name">
                    <input type="email" placeholder="Your Email">

                    <textarea placeholder="Your message..." rows="5"></textarea>

                    <button class="primary-btn" style="margin-top:15px;">
                        Send Message
                    </button>

                </div>

            </div>

        </div>

    </div>
</section>

</body>
</html>
