<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Remi+ | Appointment Booking</title>

    <!-- Main CSS -->
    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <!-- Google Font -->
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

</head>

<body>

    <!-- Background -->

    <div class="background-blur blur1"></div>

    <div class="background-blur blur2"></div>

    <!-- ================= NAVBAR ================= -->

    <header class="navbar">

        <div class="container">

            <a
                href="index.html"
                class="logo"
            >

                <div class="logo-circle">

                    <img
                        src="images/logo.jpg"
                        alt="Remi+ Logo"
                    >

                </div>

                <span>Remi+</span>

            </a>

            <nav class="nav-links">

                <a href="index.html">Home</a>

                <a href="index.html#chat">AI Chat</a>

                <a href="medication.html">Medications</a>

                <a
                    href="appointment.html"
                    class="active"
                >
                    Appointments
                </a>

                <a href="contact.html">Contact</a>

            </nav>

            <div class="nav-right">

                <button
                    id="themeToggle"
                    class="theme-toggle"
                >
                    🌙
                </button>

                <button class="login-btn">

                    Login

                </button>

            </div>

        </div>

    </header>

    <!-- =====================================================
    APPOINTMENT SECTION
    ===================================================== -->

<section class="appointment-section">

    <div class="container">

        <div class="section-title">

            <span>
                APPOINTMENT
            </span>

            <h2>

                Book an Appointment

            </h2>

            <p>

                Schedule a visit for your loved one quickly and securely.

            </p>

        </div>

        <div class="appointment-card">

            <!-- Success / Error Notification -->

            <div
                id="notification"
                class="notification"
            ></div>

            <!-- Appointment Form -->

            <form id="appointmentForm">

                <div class="appointment-grid">

                    <!-- Caretaker Name -->

                    <div class="form-group">

                        <label for="caretakerName">

                            Caretaker Name

                        </label>

                        <input
                            type="text"
                            id="caretakerName"
                            name="Caretaker Name"
                            placeholder="Enter caretaker's name"
                            required
                        >

                    </div>

                    <!-- Client Name -->

                    <div class="form-group">

                        <label for="clientName">

                            Elderly Name

                        </label>

                        <input
                            type="text"
                            id="clientName"
                            name="Client Name"
                            placeholder="Enter elderly's name"
                            required
                        >

                    </div>

                    <!-- Email -->

                    <div class="form-group">

                        <label for="email">

                            Caretaker Email

                        </label>

                        <input
                            type="email"
                            id="email"
                            name="Caretaker Email"
                            placeholder="example@email.com"
                            required
                        >

                    </div>

                    <!-- Location -->

                    <div class="form-group">

                        <label for="location">

                            Appointment Location

                        </label>

                        <input
                            type="text"
                            id="location"
                            name="Location"
                            placeholder="Hospital / Home Address"
                            required
                        >

                    </div>

                    <!-- Date -->

                    <div class="form-group">

                        <label for="date">

                            Appointment Date

                        </label>

                        <input
                            type="date"
                            id="date"
                            name="Date"
                            required
                        >

                    </div>

                    <!-- Time -->

                    <div class="form-group">

                        <label for="time">

                            Appointment Time

                        </label>

                        <input
                            type="time"
                            id="time"
                            name="Time"
                            required
                        >

                    </div>

                    <!-- Remarks -->

                    <div class="form-group full-width">

                        <label for="remarks">

                            Remarks

                        </label>

                        <textarea
                            id="remarks"
                            name="Remarks"
                            rows="5"
                            placeholder="Additional notes or special requirements..."
                        ></textarea>

                    </div>

                    <!-- Submit -->

                    <div class="form-group full-width">

                        <button
                            type="submit"
                            id="submitBtn"
                            class="primary-btn appointment-btn"
                        >

                            Submit Appointment

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

</section>

<script>

// ======================================================
// Remi+ Appointment Booking
// ======================================================

document.addEventListener("DOMContentLoaded", () => {

    const appointmentForm = document.getElementById("appointmentForm");

    if (!appointmentForm) return;

    const submitBtn = document.getElementById("submitBtn");
    const notification = document.getElementById("notification");

    // ==============================
    // Submit Appointment
    // ==============================

    appointmentForm.addEventListener("submit", async (event) => {

        event.preventDefault();

        submitBtn.disabled = true;
        submitBtn.innerHTML = "⏳ Processing...";

        notification.style.display = "none";

        // ==============================
        // Your n8n Webhook
        // ==============================

        const webhookUrl =
            "https://n8ngc.codeblazar.org/webhook/appointment-form";

        // ==============================
        // Collect Form Data
        // ==============================

        const formData = new FormData(appointmentForm);

        // Google Sheet Columns

        formData.append("Status", "Pending");

        formData.append(
            "Appointment Time",
            formData.get("Time")
        );

        try {

            const response = await fetch(webhookUrl, {

                method: "POST",
                body: formData

            });

            if (!response.ok) {

                throw new Error("Server Error");

            }

            // ==============================
            // Success
            // ==============================

            notification.className =
                "notification success";

            notification.style.display = "block";

            notification.innerHTML = `
                ✅ Appointment booked successfully!
                <br>
                Redirecting to dashboard...
            `;

            appointmentForm.reset();

            setTimeout(() => {

                window.location.href = "dashboard.html";

            }, 1500);

        }

        catch (error) {

            console.error(error);

            notification.className =
                "notification error";

            notification.style.display = "block";

            notification.innerHTML = `
                ❌ Unable to submit appointment.
                <br>
                Please try again.
            `;

            submitBtn.disabled = false;

            submitBtn.innerHTML =
                "Submit Appointment";

        }

    });

});

</script>
